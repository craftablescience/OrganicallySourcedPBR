name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # nothing here

env:
  BUILD_DIR: '${{github.workspace}}/build'

jobs:
  build-windows:
    strategy:
      matrix:
        build_type:
          - Debug
          - Release
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install NSIS
        uses: negrutiu/nsis-install@v3
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -G "Ninja" -B "${{env.BUILD_DIR}}" -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCPACK_GENERATOR=NSIS -DQT_BASEDIR="${{env.QT_ROOT_DIR}}" -DOGP_INSTALL=ON

      - name: Build Binaries
        working-directory: '${{env.BUILD_DIR}}'
        run: cmake --build . --config ${{matrix.build_type}} -t OrganicallySourcedPBR -- -j%NUMBER_OF_PROCESSORS%

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: 'MareTF-Windows-Standalone-msvc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/LICENSE
            ${{env.BUILD_DIR}}/OrganicallySourcedPBR.exe
            ${{env.BUILD_DIR}}/*.dll
            ${{env.BUILD_DIR}}/platforms/*.dll
            ${{env.BUILD_DIR}}/styles/*.dll
          retention-days: 7

      - name: Create Installer
        working-directory: ${{env.BUILD_DIR}}
        run: cpack

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: 'OrganicallySourcedPBR-Windows-Installer-msvc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/OrganicallySourcedPBR-*-win64.exe
          retention-days: 7

  build-linux:
    strategy:
      matrix:
        build_type:
          - Debug
          - Release
        cpack_generator:
          - DEB
          - RPM
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Necessary Packages
        run: sudo apt update && sudo apt install -y chrpath

      - name: Install Newer GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: 13
          platform: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Configure CMake
        run: cmake -G "Ninja" -B "${{env.BUILD_DIR}}" -DCMAKE_C_COMPILER="gcc" -DCMAKE_CXX_COMPILER="g++" -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCPACK_GENERATOR=${{matrix.cpack_generator}} -DQT_BASEDIR="${{env.QT_ROOT_DIR}}" -DOGP_INSTALL=ON

      - name: Build Binaries
        working-directory: '${{env.BUILD_DIR}}'
        run: |
          cmake --build . --config ${{matrix.build_type}} -t OrganicallySourcedPBR -- -j$(nproc)

      - name: Fixup Binaries
        run: |
          chmod +x '${{env.BUILD_DIR}}/OrganicallySourcedPBR'

          # runpath cleanup for the Qt binaries. These are (mostly) wrong, leading to crashes
          for f in ${{env.BUILD_DIR}}/*.so*; do
            echo "Fixing $f..."
            chrpath -r '$ORIGIN' "$f"
          done
          for f in ${{env.BUILD_DIR}}/*/*.so*; do
            echo "Fixing $f..."
            chrpath -r '$ORIGIN/..' "$f"
          done

      - name: Upload Standalone [cpack_generator:DEB]
        if: matrix.cpack_generator == 'DEB'
        uses: actions/upload-artifact@v4
        with:
          name: 'OrganicallySourcedPBR-Linux-Standalone-gcc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/LICENSE
            ${{env.BUILD_DIR}}/OrganicallySourcedPBR
            ${{env.BUILD_DIR}}/*.so*
            ${{env.BUILD_DIR}}/egldeviceintegrations/*.so*
            ${{env.BUILD_DIR}}/platforminputcontexts/*.so*
            ${{env.BUILD_DIR}}/platforms/*.so*
            ${{env.BUILD_DIR}}/platformthemes/*.so*
            ${{env.BUILD_DIR}}/wayland-decoration-client/*.so*
            ${{env.BUILD_DIR}}/wayland-graphics-integration-client/*.so*
            ${{env.BUILD_DIR}}/wayland-shell-integration/*.so*
            ${{env.BUILD_DIR}}/xcbglintegrations/*.so*
          retention-days: 7

      - name: Create Installer
        working-directory: ${{env.BUILD_DIR}}
        run: cpack

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: 'OrganicallySourcedPBR-Linux-${{matrix.cpack_generator}}-Installer-gcc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/OrganicallySourcedPBR-*-Linux.*
          retention-days: 7
